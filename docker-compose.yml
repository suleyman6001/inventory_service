services:
  inventory_db:
    image: postgres:18
    container_name: inventory_db
    environment:
      POSTGRES_DB: inventory_service
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "5433:5432"
    volumes:
      - inventory_service_pgdata:/var/lib/postgresql

  app:
    build: .
    container_name: inventory_service
    depends_on:
      - inventory_db
    ports:
      - "8082:8082"
    env_file:
      - .env

volumes:
  inventory_service_pgdata:
